<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CleanShotAI — Удаление вотермарков</title>
<style>
:root {
  --md-primary: #6750A4;
  --md-primary-container: #EADDFF;
  --md-on-primary: #FFFFFF;
  --md-on-primary-container: #21005D;
  --md-secondary: #625B71;
  --md-secondary-container: #E8DEF8;
  --md-on-secondary-container: #1D192B;
  --md-tertiary: #7D5260;
  --md-tertiary-container: #FFD8E4;
  --md-on-tertiary-container: #31111D;
  --md-surface: #FEF7FF;
  --md-surface-variant: #E7E0EC;
  --md-on-surface: #1C1B1F;
  --md-on-surface-variant: #49454F;
  --md-outline: #79747E;
  --md-outline-variant: #CAC4D0;
  --md-background: #FEF7FF;
  --md-error: #B3261E;
  --md-error-container: #F9DEDC;
  --md-success: #146C2E;
  --md-success-container: #C3EFCD;
  --md-surface-1: color-mix(in srgb, var(--md-primary) 5%, var(--md-surface));
  --md-surface-2: color-mix(in srgb, var(--md-primary) 8%, var(--md-surface));
  --md-surface-3: color-mix(in srgb, var(--md-primary) 11%, var(--md-surface));
  --radius-xs: 4px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --radius-full: 50px;
  --elevation-1: 0 1px 2px rgba(0,0,0,.1), 0 1px 3px 1px rgba(0,0,0,.06);
  --elevation-2: 0 1px 2px rgba(0,0,0,.12), 0 2px 6px 2px rgba(0,0,0,.08);
  --elevation-3: 0 4px 8px 3px rgba(0,0,0,.1), 0 1px 3px rgba(0,0,0,.12);
}
*, ::after, ::before { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Google Sans', Roboto, system-ui, sans-serif;
  background: var(--md-background);
  color: var(--md-on-surface);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}
.top-bar {
  position: sticky; top: 0; z-index: 100;
  background: var(--md-surface-2);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--md-outline-variant);
  padding: 0 24px; height: 64px;
  display: flex; align-items: center; gap: 16px;
  box-shadow: var(--elevation-1);
}
.top-bar-icon {
  width: 40px; height: 40px;
  background: var(--md-primary-container);
  border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  color: var(--md-on-primary-container); flex-shrink: 0;
}
.top-bar-icon svg { width: 22px; height: 22px; }
.top-bar-title {
  font-family: 'Google Sans Display', sans-serif;
  font-size: 22px; font-weight: 700;
  color: var(--md-on-surface); letter-spacing: -.3px; flex: 1;
}
.top-bar-title span { color: var(--md-primary); }
.badge {
  background: var(--md-tertiary-container);
  color: var(--md-on-tertiary-container);
  font-size: 11px; font-weight: 600;
  padding: 4px 10px; border-radius: var(--radius-full);
  text-transform: uppercase; letter-spacing: .5px;
}
.main {
  flex: 1; max-width: 1100px; width: 100%;
  margin: 0 auto; padding: 32px 24px 48px;
  display: flex; flex-direction: column; gap: 28px;
}
.feature-chips { display: flex; gap: 10px; flex-wrap: wrap; }
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: var(--radius-full);
  font-size: 13px; font-weight: 500;
  background: var(--md-surface-variant);
  color: var(--md-on-surface-variant);
  border: 1px solid var(--md-outline-variant);
}
.chip svg { width: 16px; height: 16px; }
.chip.active {
  background: var(--md-secondary-container);
  color: var(--md-on-secondary-container);
  border-color: var(--md-secondary);
}
.card {
  background: var(--md-surface);
  border-radius: var(--radius-xl);
  border: 1px solid var(--md-outline-variant);
  overflow: hidden;
  box-shadow: var(--elevation-1);
  transition: box-shadow .2s ease;
}
.card:hover { box-shadow: var(--elevation-2); }
.card-header {
  padding: 20px 24px 0;
  display: flex; align-items: center; gap: 12px;
}
.card-header-icon {
  width: 36px; height: 36px;
  border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.card-header-icon svg { width: 20px; height: 20px; }
.card-title { font-size: 16px; font-weight: 600; color: var(--md-on-surface); }
.card-subtitle { font-size: 12px; color: var(--md-on-surface-variant); margin-top: 1px; }
.card-body { padding: 16px 24px 24px; }
.drop-zone {
  border: 2px dashed var(--md-outline);
  border-radius: var(--radius-lg);
  padding: 48px 24px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px; cursor: pointer;
  transition: all .25s cubic-bezier(.2,0,0,1);
  background: var(--md-surface-1);
  text-align: center; position: relative; overflow: hidden;
}
.drop-zone::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(circle at 50% 0, color-mix(in srgb, var(--md-primary) 6%, transparent), transparent 70%);
  pointer-events: none;
}
.drop-zone.drag-over, .drop-zone:hover {
  border-color: var(--md-primary);
  background: var(--md-primary-container);
  box-shadow: 0 0 0 1px var(--md-primary);
  transform: scale(1.005);
}
.drop-zone-icon {
  width: 72px; height: 72px;
  background: var(--md-primary-container);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: var(--md-primary);
  transition: transform .3s cubic-bezier(.34,1.56,.64,1);
}
.drop-zone:hover .drop-zone-icon { transform: scale(1.1); }
.drop-zone-icon svg { width: 32px; height: 32px; }
.drop-zone-title { font-size: 18px; font-weight: 600; color: var(--md-on-surface); }
.drop-zone-subtitle { font-size: 14px; color: var(--md-on-surface-variant); line-height: 1.5; }
.drop-zone-formats { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
.format-tag {
  background: var(--md-surface-variant);
  color: var(--md-on-surface-variant);
  padding: 4px 10px; border-radius: var(--radius-full);
  font-size: 12px; font-family: 'Roboto Mono', monospace;
  font-weight: 500; border: 1px solid var(--md-outline-variant);
}
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 24px; border-radius: var(--radius-full);
  font-family: 'Google Sans', sans-serif;
  font-size: 14px; font-weight: 600; letter-spacing: .1px;
  border: none; cursor: pointer;
  transition: all .2s cubic-bezier(.2,0,0,1);
  position: relative; overflow: hidden;
  white-space: nowrap; text-decoration: none;
}
.btn::after {
  content: ''; position: absolute; inset: 0;
  background: currentColor; opacity: 0; transition: opacity .2s;
}
.btn:hover::after { opacity: .08; }
.btn:active::after { opacity: .16; }
.btn svg { width: 18px; height: 18px; flex-shrink: 0; }
.btn-filled { background: var(--md-primary); color: var(--md-on-primary); box-shadow: var(--elevation-1); }
.btn-filled:hover { box-shadow: var(--elevation-2); }
.btn-tonal { background: var(--md-secondary-container); color: var(--md-on-secondary-container); }
.btn-outlined { background: transparent; color: var(--md-primary); border: 1px solid var(--md-outline); }
.result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 700px) { .result-grid { grid-template-columns: 1fr; } }
.result-panel { border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--md-outline-variant); }
.result-panel-header {
  padding: 10px 14px;
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; font-weight: 600;
  background: var(--md-surface-2);
  border-bottom: 1px solid var(--md-outline-variant);
}
.result-panel-header .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.result-panel img { width: 100%; display: block; background: #f0f0f0; }
.result-actions { display: flex; gap: 12px; padding-top: 16px; flex-wrap: wrap; }
.metadata-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
.meta-item {
  background: var(--md-surface-1);
  border: 1px solid var(--md-outline-variant);
  border-radius: var(--radius-md);
  padding: 14px 16px;
  display: flex; align-items: flex-start; gap: 12px;
}
.meta-item.removed { background: var(--md-success-container); border-color: var(--md-success); }
.meta-item-icon {
  width: 36px; height: 36px; border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; background: var(--md-surface-variant);
  color: var(--md-on-surface-variant);
}
.meta-item.removed .meta-item-icon { background: var(--md-success); color: #fff; }
.meta-item-icon svg { width: 18px; height: 18px; }
.meta-item-content { flex: 1; min-width: 0; }
.meta-item-label { font-size: 11px; font-weight: 600; color: var(--md-on-surface-variant); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 2px; }
.meta-item-value { font-size: 13px; font-weight: 500; color: var(--md-on-surface); word-break: break-all; }
.meta-item.removed .meta-item-value { color: var(--md-success); text-decoration: line-through; opacity: .7; }
.meta-removed-badge {
  position: absolute; top: 8px; right: 8px;
  background: var(--md-success); color: #fff;
  font-size: 9px; font-weight: 700;
  padding: 2px 6px; border-radius: var(--radius-full);
  text-transform: uppercase; letter-spacing: .5px;
}
.meta-item { position: relative; }
.processing-overlay {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 20px; padding: 48px 24px; text-align: center;
}
.spinner { width: 56px; height: 56px; }
.spinner svg { width: 56px; height: 56px; animation: rotate 2s linear infinite; }
.spinner circle { fill: none; stroke-width: 4; stroke: var(--md-primary-container); }
.spinner .track { stroke: var(--md-primary); stroke-dasharray: 150; stroke-dashoffset: 0; stroke-linecap: round; animation: dash 1.5s ease-in-out infinite; }
@keyframes rotate { to { transform: rotate(360deg); } }
@keyframes dash {
  0% { stroke-dasharray: 1 150; stroke-dashoffset: 0; }
  50% { stroke-dasharray: 90 150; stroke-dashoffset: -35; }
  100% { stroke-dasharray: 90 150; stroke-dashoffset: -124; }
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.anim-in { animation: fadeIn .4s cubic-bezier(.2,0,0,1) forwards; }
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #322f35; color: #e6e1e5;
  padding: 14px 20px; border-radius: var(--radius-full);
  font-size: 14px; font-weight: 500;
  box-shadow: var(--elevation-3); z-index: 999;
  transition: transform .3s cubic-bezier(.34,1.56,.64,1);
  display: flex; align-items: center; gap: 10px;
  max-width: 90vw;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast svg { width: 18px; height: 18px; flex-shrink: 0; }
.toast.error { background: var(--md-error); color: #fff; }
.toast.success { background: var(--md-success); color: #fff; }
</style>
</head>

// ── Alpha Map ─────────────────────────────────────────────────────────────────
function calculateAlphaMap(bgImageData) {
  const { data, width, height } = bgImageData;
  const alphaMap = new Float32Array(width * height);
  for (let i = 0; i < alphaMap.length; i++) {
    const idx = i * 4;
    alphaMap[i] = Math.max(data[idx], data[idx + 1], data[idx + 2]) / 255.0;
  }
  return alphaMap;
}

// ── Blend Modes ───────────────────────────────────────────────────────────────
const ALPHA_THRESHOLD = 0.002;
const MAX_ALPHA = 0.99;
const LOGO_VALUE = 255;

function removeWatermark(imageData, alphaMap, position) {
  const { x, y, width, height } = position;
  for (let row = 0; row < height; row++) {
    for (let col = 0; col < width; col++) {
      const imgIdx = ((y + row) * imageData.width + (x + col)) * 4;
      const alphaIdx = row * width + col;
      let alpha = alphaMap[alphaIdx];
      if (alpha < ALPHA_THRESHOLD) continue;
      alpha = Math.min(alpha, MAX_ALPHA);
      for (let c = 0; c < 3; c++) {
        const watermarked = imageData.data[imgIdx + c];
        const original = (watermarked - alpha * LOGO_VALUE) / (1.0 - alpha);
        imageData.data[imgIdx + c] = Math.max(0, Math.min(255, Math.round(original)));
      }
    }
  }
}

// ── Engine ────────────────────────────────────────────────────────────────────
const Engine = {
  alphaMaps: {},

  loadBg(b64, size) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => {
        const c = document.createElement('canvas');
        c.width = size; c.height = size;
        c.getContext('2d').drawImage(img, 0, 0);
        const map = calculateAlphaMap(c.getContext('2d').getImageData(0, 0, size, size));
        resolve(map);
      };
      img.onerror = reject;
      img.src = 'data:image/png;base64,' + b64;
    });
  },

  async init() {
    if (this.alphaMaps[48] && this.alphaMaps[96]) return;
    [this.alphaMaps[48], this.alphaMaps[96]] = await Promise.all([
      this.loadBg(BG48_B64, 48),
      this.loadBg(BG96_B64, 96),
    ]);
  },

  getWatermarkInfo(width, height) {
    const isLarge = width > 1024 && height > 1024;
    const size = isLarge ? 96 : 48;
    const margin = isLarge ? 64 : 32;
    return { size, x: width - margin - size, y: height - margin - size, width: size, height: size };
  },

  async process(imageFile) {
    await this.init();
    const objectUrl = URL.createObjectURL(imageFile);
    const img = await new Promise((resolve, reject) => {
      const i = new Image(); i.onload = () => resolve(i); i.onerror = reject; i.src = objectUrl;
    });
    const canvas = document.createElement('canvas');
    canvas.width = img.width; canvas.height = img.height;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0);
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const config = this.getWatermarkInfo(canvas.width, canvas.height);
    removeWatermark(imageData, this.alphaMaps[config.size], config);
    ctx.putImageData(imageData, 0, 0);
    const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
    return { blob, originalSrc: objectUrl, width: img.width, height: img.height };
  },
};

// ── Metadata Cleaner ──────────────────────────────────────────────────────────
const MetadataCleaner = {
  async clean(dataUrl, originalFile) {
    try {
      const mimeType = originalFile ? originalFile.type : 'image/png';
      if (mimeType === 'image/jpeg' || mimeType === 'image/jpg') return await this.cleanJpeg(dataUrl);
      return await this.cleanPng(dataUrl);
    } catch { return dataUrl; }
  },

  async cleanJpeg(dataUrl) {
    const binary = atob(dataUrl.split(',')[1]);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    return this._uint8ToDataUrl(this._stripJpegMetadata(bytes), 'image/jpeg');
  },

  _stripJpegMetadata(bytes) {
    if (bytes[0] !== 0xFF || bytes[1] !== 0xD8) return bytes;
    const result = [0xFF, 0xD8];
    let i = 2;
    while (i < bytes.length) {
      if (bytes[i] !== 0xFF) { i++; continue; }
      const marker = bytes[i + 1];
      if (marker === 0xDA) { for (let j = i; j < bytes.length; j++) result.push(bytes[j]); break; }
      const len = (bytes[i + 2] << 8) | bytes[i + 3];
      const isApp0Jfif = marker === 0xE0 && bytes[i + 4] === 0x4A && bytes[i + 5] === 0x46;
      const isMetadata = (marker >= 0xE1 && marker <= 0xEF) || marker === 0xFE;
      if (isMetadata && !isApp0Jfif) { i += 2 + len; }
      else { for (let j = i; j < i + 2 + len; j++) result.push(bytes[j]); i += 2 + len; }
    }
    return new Uint8Array(result);
  },

  async cleanPng(dataUrl) {
    const binary = atob(dataUrl.split(',')[1]);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    return this._uint8ToDataUrl(this._stripPngMetadata(bytes), 'image/png');
  },

  _stripPngMetadata(bytes) {
    const sig = [137,80,78,71,13,10,26,10];
    const result = [...sig];
    const stripTypes = new Set(['tEXt','iTXt','zTXt','eXIf','iCCP','sRGB','gAMA','bKGD','hIST','sBIT','tIME','pHYs','sPLT']);
    let i = 8;
    while (i < bytes.length) {
      const len = (bytes[i]<<24)|(bytes[i+1]<<16)|(bytes[i+2]<<8)|bytes[i+3];
      const type = String.fromCharCode(bytes[i+4],bytes[i+5],bytes[i+6],bytes[i+7]);
      const chunkTotal = 4+4+len+4;
      if (type === 'IEND') { for (let j=i;j<i+chunkTotal;j++) result.push(bytes[j]); break; }
      if (stripTypes.has(type)) { i += chunkTotal; continue; }
      for (let j=i;j<i+chunkTotal;j++) result.push(bytes[j]);
      i += chunkTotal;
    }
    return new Uint8Array(result);
  },

  _uint8ToDataUrl(bytes, mime) {
    let binary = '';
    for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
    return 'data:' + mime + ';base64,' + btoa(binary);
  },

  async extractInfo(file) {
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const bytes = new Uint8Array(e.target.result);
        const info = [];
        if (bytes[0] === 0xFF && bytes[1] === 0xD8) {
          let i = 2;
          while (i < bytes.length - 4) {
            if (bytes[i] !== 0xFF) { i++; continue; }
            const marker = bytes[i+1];
            if (marker === 0xDA) break;
            const len = (bytes[i+2]<<8)|bytes[i+3];
            if (marker === 0xE1) {
              const seg = String.fromCharCode(...Array.from(bytes.slice(i+4,i+10)));
              if (seg.startsWith('Exif')) info.push({label:'EXIF',value:len+' байт данных',type:'exif'});
              else if (seg.startsWith('http:')) info.push({label:'XMP',value:len+' байт данных',type:'xmp'});
              else info.push({label:'APP1',value:len+' байт',type:'app'});
            }
            if (marker === 0xE2) info.push({label:'ICC Profile',value:len+' байт',type:'icc'});
            if (marker === 0xED) info.push({label:'Photoshop/IPTC',value:len+' байт данных',type:'iptc'});
            if (marker === 0xFE) info.push({label:'Комментарий',value:len+' байт',type:'comment'});
            i += 2+len;
          }
        }
        if (bytes[0]===137 && bytes[1]===80) {
          let i = 8;
          while (i < bytes.length-12) {
            const len = (bytes[i]<<24)|(bytes[i+1]<<16)|(bytes[i+2]<<8)|bytes[i+3];
            const type = String.fromCharCode(bytes[i+4],bytes[i+5],bytes[i+6],bytes[i+7]);
            if (type === 'IEND') break;
            if (['tEXt','iTXt','zTXt'].includes(type)) {
              let keyEnd = i+8;
              while (keyEnd < bytes.length && bytes[keyEnd] !== 0) keyEnd++;
              const key = String.fromCharCode(...Array.from(bytes.slice(i+8,keyEnd)));
              info.push({label:type+': '+key,value:len+' байт',type:'text'});
            }
            if (type === 'eXIf') info.push({label:'PNG EXIF',value:len+' байт',type:'exif'});
            if (type === 'iCCP') info.push({label:'ICC Profile',value:len+' байт',type:'icc'});
            if (type === 'tIME') info.push({label:'Время создания',value:'метаданные',type:'time'});
            i += 4+4+len+4;
          }
        }
        info.push({label:'SynthID',value:'Цифровой водяной знак Google',type:'synthid'});
        info.push({label:'Генеративные метаданные',value:'AI-сигнатуры ИИ',type:'ai'});
        resolve(info);
      };
      reader.readAsArrayBuffer(file);
    });
  },
};

// ── State ─────────────────────────────────────────────────────────────────────
let appState = 'upload';
let uploadedFile = null;
let originalUrl = '';
let resultUrl = '';
let metaInfo = [];
let toastTimer = null;

function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  el.className = 'toast' + (type ? ' ' + type : '') + ' show';
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const root = document.getElementById('app-root');
  root.innerHTML = '';
  if (appState === 'upload') root.appendChild(renderUpload());
  else if (appState === 'processing') root.appendChild(renderProcessing());
  else if (appState === 'result') renderResult(root);
}

function renderUpload() {
  const card = document.createElement('div');
  card.className = 'card anim-in';
  card.innerHTML = `
    <div class="card-header">
      <div class="card-header-icon" style="background:var(--md-primary-container);color:var(--md-primary)">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      </div>
      <div>
        <div class="card-title">Загрузить изображение</div>
        <div class="card-subtitle">PNG, JPEG, WebP до 50 МБ — Gemini вотермарк будет удалён автоматически</div>
      </div>
    </div>
    <div class="card-body">
      <div class="drop-zone" id="drop-zone">
        <div class="drop-zone-icon">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
        </div>
        <div class="drop-zone-title">Перетащите изображение сюда</div>
        <div class="drop-zone-subtitle">или нажмите чтобы выбрать файл<br>Вотермарк Gemini удаляется мгновенно без ИИ-модели</div>
        <div class="drop-zone-formats">
          <span class="format-tag">PNG</span>
          <span class="format-tag">JPEG</span>
          <span class="format-tag">WEBP</span>
        </div>
      </div>
      <input type="file" id="file-input" accept="image/png,image/jpeg,image/jpg,image/webp" style="display:none"/>
    </div>
  `;
  const dz = card.querySelector('#drop-zone');
  const fi = card.querySelector('#file-input');
  dz.addEventListener('click', () => fi.click());
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag-over'); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });
  fi.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });
  return card;
}

function renderProcessing() {
  const card = document.createElement('div');
  card.className = 'card anim-in';
  card.innerHTML = `
    <div class="processing-overlay">
      <div class="spinner">
        <svg viewBox="0 0 50 50">
          <circle class="bg" cx="25" cy="25" r="20"/>
          <circle class="track" cx="25" cy="25" r="20"/>
        </svg>
      </div>
      <div style="font-size:16px;font-weight:600;color:var(--md-on-surface)">Обработка...</div>
      <div style="font-size:13px;color:var(--md-on-surface-variant)">Удаление вотермарка и очистка метаданных</div>
    </div>
  `;
  return card;
}

function metaIcon(type) {
  if (type === 'exif') return `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>`;
  if (type === 'synthid' || type === 'ai') return `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zm4.24 16L12 15.45 7.77 18l1.12-4.81-3.73-3.23 4.92-.42L12 5l1.92 4.53 4.92.42-3.73 3.23L16.23 18z"/></svg>`;
  return `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>`;
}

function renderResult(root) {
  const card = document.createElement('div');
  card.className = 'card anim-in';
  card.innerHTML = `
    <div class="card-header">
      <div class="card-header-icon" style="background:var(--md-success-container);color:var(--md-success)">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
      </div>
      <div>
        <div class="card-title">Готово!</div>
        <div class="card-subtitle">Вотермарк удалён, метаданные очищены</div>
      </div>
    </div>
    <div class="card-body">
      <div class="result-grid">
        <div class="result-panel">
          <div class="result-panel-header"><div class="dot" style="background:#b3261e"></div>Оригинал</div>
          <img src="${originalUrl}" alt="Оригинал"/>
        </div>
        <div class="result-panel">
          <div class="result-panel-header"><div class="dot" style="background:#146c2e"></div>Результат</div>
          <img src="${resultUrl}" alt="Результат"/>
        </div>
      </div>
      <div class="result-actions">
        <a class="btn btn-filled" href="${resultUrl}" download="cleanshot-result.png">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
          Скачать PNG
        </a>
        <button class="btn btn-tonal" id="btn-reset">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
          Новое изображение
        </button>
      </div>
    </div>
  `;
  card.querySelector('#btn-reset').addEventListener('click', () => {
    appState = 'upload'; originalUrl = ''; resultUrl = ''; uploadedFile = null; metaInfo = []; render();
  });
  root.appendChild(card);

  if (metaInfo.length > 0) {
    const metaCard = document.createElement('div');
    metaCard.className = 'card anim-in';
    metaCard.innerHTML = `
      <div class="card-header">
        <div class="card-header-icon" style="background:var(--md-tertiary-container);color:var(--md-tertiary)">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
        </div>
        <div>
          <div class="card-title">Очищенные метаданные</div>
          <div class="card-subtitle">Все данные ИИ-генерации удалены из файла</div>
        </div>
      </div>
      <div class="card-body">
        <div class="metadata-grid">
          ${metaInfo.map(item => `
            <div class="meta-item removed">
              <div class="meta-item-icon">${metaIcon(item.type)}</div>
              <div class="meta-item-content">
                <div class="meta-item-label">${item.label}</div>
                <div class="meta-item-value">${item.value}</div>
              </div>
              <span class="meta-removed-badge">Удалено</span>
            </div>
          `).join('')}
        </div>
      </div>
    `;
    root.appendChild(metaCard);
  }
}

// ── File handling ─────────────────────────────────────────────────────────────
async function handleFile(file) {
  const ALLOWED = ['image/png','image/jpeg','image/jpg','image/webp'];
  if (!ALLOWED.includes(file.type)) { showToast('Неподдерживаемый формат. PNG, JPEG или WebP.', 'error'); return; }
  if (file.size > 50 * 1024 * 1024) { showToast('Файл слишком большой. Максимум 50 МБ.', 'error'); return; }

  uploadedFile = file;
  appState = 'processing';
  render();

  try {
    metaInfo = await MetadataCleaner.extractInfo(file);

    const result = await Engine.process(file);
    originalUrl = result.originalSrc;

    // Convert blob to data URL then clean metadata
    const rawDataUrl = await new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result);
      reader.readAsDataURL(result.blob);
    });

    resultUrl = await MetadataCleaner.clean(rawDataUrl, file);
    appState = 'result';
    render();
    showToast('Вотермарк успешно удалён!', 'success');
  } catch (err) {
    console.error(err);
    showToast('Ошибка: ' + err.message, 'error');
    appState = 'upload';
    render();
  }
}

render();
</script>
